[pytest]
# Parallel execution (`-n auto`) is NOT safe for this suite. Several
# tests invoke VULCAN's FastChem subprocess, which writes to a fixed
# path under fastchem_vulcan/output/; concurrent runs collide. Run
# serially: `pytest tests/`.
testpaths = tests
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
addopts = -ra --tb=short
