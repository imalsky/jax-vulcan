[pytest]
# `pytest -n auto` is safe because FastChem invocations are
# serialised across workers via `fcntl.flock` on
# `fastchem_vulcan/.fastchem_lock` (see `ini_abun._load_eq_y`).
testpaths = tests
python_files = test_*.py
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
addopts = -ra --tb=short
